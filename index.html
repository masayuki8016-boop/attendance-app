<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校出欠管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        
        .student-unit {
            width: 45px;
            height: 65px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            position: relative;
        }

        .absent-num {
            font-size: 1.5rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 700;
            color: #0f172a;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .late-square { 
            border: 3px solid #ef4444; 
            border-radius: 8px; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #fef2f2; 
        }
        .late-time { 
            position: absolute; 
            bottom: 0px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 11px; 
            color: #ef4444; 
            font-weight: 900; 
            white-space: nowrap; 
        }
        
        .leave-square { 
            border: 3px solid #9333ea; 
            border-radius: 8px; 
            width: 45px; 
            height: 45px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background-color: #faf5ff; 
        }
        .leave-time { 
            position: absolute; 
            bottom: 0px; 
            left: 50%; 
            transform: translateX(-50%); 
            font-size: 11px; 
            color: #9333ea; 
            font-weight: 900; 
            white-space: nowrap; 
        }

        .font-mono-bold {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-weight: 700;
        }
    </style>
</head>
<body class="bg-slate-100 pb-24">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // ==========================================================
        // Firebase設定
        // ==========================================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' 
            ? JSON.parse(__firebase_config) 
            : {
                apiKey: "あなたのAPIキー",
                authDomain: "あなたのプロジェクト.firebaseapp.com",
                projectId: "あなたのプロジェクトID",
                storageBucket: "あなたのプロジェクト.firebasestorage.app",
                messagingSenderId: "あなたの送信者ID",
                appId: "あなたのアプリID"
            };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'school-attendance-default';
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let state = {
            user: null,
            attendances: [],
            view: 'dashboard',
            selectedStudent: null,
            currentTime: "",
            selectedDate: new Date().toISOString().split('T')[0] // デフォルトは今日 YYYY-MM-DD
        };

        const getCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'attendance');
        const getDocRef = (id) => doc(db, 'artifacts', appId, 'public', 'data', 'attendance', id);

        function updateClock() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            state.currentTime = timeStr;
            const clockEl = document.getElementById('digital-clock');
            if (clockEl) clockEl.innerText = timeStr;
        }

        async function init() {
            setInterval(updateClock, 1000);
            updateClock();

            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (err) {
                    console.error("Auth Error:", err);
                }
            };

            await initAuth();

            onAuthStateChanged(auth, (user) => {
                state.user = user;
                if (user) {
                    subscribeData();
                }
                render();
            });
        }

        function subscribeData() {
            if (!state.user) return;
            onSnapshot(getCol(), (snapshot) => {
                state.attendances = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.user) return;

            const displayDate = new Date(state.selectedDate);
            const dateStr = displayDate.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric' });
            const weekStr = displayDate.toLocaleDateString('ja-JP', { weekday: 'long' });

            root.innerHTML = `
                <header class="bg-white border-b sticky top-0 z-30 px-4 py-4 shadow-sm">
                    <div class="max-w-7xl mx-auto flex items-center justify-between">
                        <div class="flex items-center gap-2 w-1/4">
                            <div class="bg-indigo-600 p-1.5 rounded-lg text-white"><i data-lucide="layout-dashboard"></i></div>
                            <h1 class="text-xs font-bold hidden lg:block text-slate-700">集中出欠管理</h1>
                        </div>

                        <div class="flex-grow flex justify-center">
                            <div id="digital-clock" class="text-4xl md:text-5xl font-mono font-black text-indigo-600 tracking-tighter tabular-nums">
                                ${state.currentTime}
                            </div>
                        </div>

                        <div class="w-1/4 text-right flex flex-col justify-center cursor-pointer" onclick="document.getElementById('date-picker').showPicker()">
                            <input type="date" id="date-picker" class="hidden" value="${state.selectedDate}" onchange="changeDate(this.value)">
                            <div class="text-sm md:text-base font-black text-slate-800 leading-none flex items-center justify-end gap-1">
                                ${dateStr} <i data-lucide="calendar" class="w-3 h-3"></i>
                            </div>
                            <div class="text-[10px] md:text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider">
                                ${weekStr}
                            </div>
                        </div>
                    </div>
                </header>

                <main class="max-w-7xl mx-auto p-4">
                    ${state.view === 'dashboard' ? renderDashboard() : renderRegister()}
                </main>

                <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around shadow-lg">
                    <button onclick="setView('dashboard')" class="flex flex-col items-center ${state.view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="layout-dashboard"></i><span class="text-[10px] font-bold">集中画面</span>
                    </button>
                    <button onclick="setView('register')" class="flex flex-col items-center ${state.view === 'register' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="user-plus"></i><span class="text-[10px] font-bold">新規登録</span>
                    </button>
                </nav>

                ${state.selectedStudent ? renderModal() : ''}
            `;
            lucide.createIcons();
        }

        window.setView = (v) => { state.view = v; render(); };
        window.changeDate = (d) => { state.selectedDate = d; render(); };

        function renderDashboard() {
            const grades = [1, 2, 3];
            const classes = [1, 2, 3, 4, 5];
            const targetDate = state.selectedDate;
            
            let html = `
                <div class="grid grid-cols-3 md:grid-cols-6 gap-2 mb-8 text-[10px] font-bold text-center">
                    <div class="bg-white p-2 rounded border shadow-sm">不在：黒</div>
                    <div class="bg-white p-2 rounded border shadow-sm text-green-600">公欠：緑</div>
                    <div class="bg-white p-2 rounded border shadow-sm text-orange-500">ラーケ：橙</div>
                    <div class="bg-white p-2 rounded border shadow-sm text-blue-600">感染症：青</div>
                    <div class="bg-white p-2 rounded border shadow-sm text-red-500 font-black">遅刻：赤角</div>
                    <div class="bg-white p-2 rounded border shadow-sm text-purple-600 font-black">早退：紫角</div>
                </div>
            `;

            grades.forEach(g => {
                html += `<h2 class="text-xl font-black mb-3 mt-6 border-l-4 border-slate-700 pl-2 text-slate-700">${g}学年</h2>`;
                html += `<div class="grid grid-cols-1 md:grid-cols-5 gap-4">`;
                classes.forEach(c => {
                    // クラス掲示は選択された日付のものだけ表示
                    const students = state.attendances.filter(s => 
                        s.grade == g && s.class == c && 
                        ['absent','official','vacation','earlyLeave'].includes(s.type) &&
                        s.date === targetDate
                    );
                    html += `
                        <div class="bg-white rounded-xl shadow-sm border overflow-hidden min-h-[140px]">
                            <div class="bg-slate-50 border-b px-3 py-1.5 text-sm font-bold flex justify-between">
                                <span>${c}組</span>
                                <span class="text-slate-400 font-mono">${students.length}</span>
                            </div>
                            <div class="p-3 flex flex-wrap gap-x-4 gap-y-2 items-start">
                                ${students.length === 0 ? '<span class="text-[10px] text-slate-300 italic">なし</span>' : ''}
                                ${students.map(s => {
                                    let content = "";
                                    if (s.status === 'late') {
                                        content = `
                                            <div class="late-square text-xl font-mono-bold text-red-600">${s.studentNum}</div>
                                            <div class="late-time">${s.arrivalTime}</div>
                                        `;
                                    } else if (s.type === 'earlyLeave') {
                                        content = `
                                            <div class="leave-square text-xl font-mono-bold text-purple-600">${s.studentNum}</div>
                                            <div class="leave-time">${s.leaveTime || '--:--'}</div>
                                        `;
                                    } else {
                                        content = `
                                            <div class="absent-num ${s.type==='official'?'text-green-600':s.type==='vacation'?'text-orange-500':'text-slate-900'}">${s.studentNum}</div>
                                        `;
                                    }
                                    return `
                                        <div onclick="selectStudent('${s.id}')" class="student-unit cursor-pointer">
                                            ${content}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            });

            // 学年共有部は日付に関わらず（削除されるまで）表示
            const shared = state.attendances.filter(s => ['long','infection','special'].includes(s.type));
            html += `
                <h2 class="text-xl font-black mb-3 mt-10 border-l-4 border-indigo-600 pl-2 text-indigo-700">学年共有部 (継続情報)</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    ${shared.map(s => `
                        <div onclick="selectStudent('${s.id}')" class="bg-white p-4 rounded-xl border-l-4 ${s.type==='infection'?'border-blue-500':'border-slate-800'} shadow-sm flex gap-4 cursor-pointer hover:bg-slate-50 transition-colors">
                            <div class="text-2xl font-mono-bold ${s.type==='infection'?'text-blue-600':'text-slate-900'} ${s.type==='special'?'border-2 border-slate-900 rounded-lg w-10 h-10 flex items-center justify-center':''}">${s.studentId}</div>
                            <div>
                                <div class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${s.type==='infection'?'感染症':s.type==='long'?'長欠':'特別指導'}</div>
                                <div class="text-sm font-bold">${s.detail || ''}</div>
                                <div class="text-[10px] text-slate-400 font-bold mt-1 bg-slate-100 px-1 rounded inline-block">期間: ${s.period || '未設定'}</div>
                            </div>
                        </div>
                    `).join('')}
                    ${shared.length === 0 ? '<p class="text-slate-400 text-sm italic py-4">共有情報はありません</p>' : ''}
                </div>
            `;
            return html;
        }

        function renderRegister() {
            return `
                <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl border p-6 space-y-6 animate-in slide-in-from-right duration-200">
                    <h2 class="text-2xl font-black text-indigo-600">新規登録</h2>
                    <div class="bg-indigo-50 p-3 rounded-xl border border-indigo-100">
                        <label class="block text-xs font-black text-indigo-400 mb-1 tracking-widest">登録対象日</label>
                        <input type="date" id="reg-date" class="bg-transparent font-bold text-indigo-700 outline-none w-full" value="${state.selectedDate}">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-2">4ケタ番号 (例: 1105)</label>
                        <input id="in-code" type="number" class="w-full bg-slate-50 border-2 rounded-2xl p-4 text-4xl font-mono text-center tracking-widest outline-none focus:border-indigo-500" placeholder="0000">
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="add('absent')" class="p-3 bg-slate-800 text-white rounded-xl font-bold text-xs hover:bg-slate-700">不在</button>
                        <button onclick="add('official')" class="p-3 bg-green-600 text-white rounded-xl font-bold text-xs hover:bg-green-500">公欠</button>
                        <button onclick="add('vacation')" class="p-3 bg-orange-500 text-white rounded-xl font-bold text-xs hover:bg-orange-400">ラーケ</button>
                        <button onclick="add('earlyLeave')" class="p-3 bg-purple-600 text-white rounded-xl font-bold text-xs hover:bg-purple-500">早退</button>
                        <button onclick="add('infection')" class="p-3 bg-blue-600 text-white rounded-xl font-bold text-xs hover:bg-blue-500">感染症</button>
                        <button onclick="add('long')" class="p-3 bg-slate-500 text-white rounded-xl font-bold text-xs hover:bg-slate-400">長欠</button>
                    </div>
                    <div class="space-y-3 pt-2 border-t">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">詳細入力</label>
                        <div class="flex gap-2">
                            <input id="in-time" type="time" class="w-1/3 border p-3 rounded-xl outline-none focus:border-indigo-500" title="時間入力">
                            <input id="in-detail" type="text" placeholder="理由・症状など" class="flex-1 border p-3 rounded-xl outline-none focus:border-indigo-500">
                        </div>
                        <input id="in-period" type="text" placeholder="期間 (例: ~4/25まで)" class="w-full border p-3 rounded-xl outline-none focus:border-indigo-500">
                    </div>
                </div>
            `;
        }

        function renderModal() {
            const s = state.selectedStudent;
            return `
                <div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                    <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-6 animate-in zoom-in duration-200">
                        <div class="text-center">
                            <div class="text-5xl font-mono-bold font-black text-slate-800">${s.studentId}</div>
                            <div class="text-sm text-slate-400 font-bold mt-1">${s.grade}年${s.class}組 ${s.studentNum}番</div>
                            <div class="text-[10px] text-slate-300 mt-2">登録日: ${s.date}</div>
                        </div>
                        
                        <div class="space-y-3 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                            <label class="block text-center font-bold text-slate-500 text-xs uppercase tracking-widest">登校時間を入力して赤四角を表示</label>
                            <input id="late-time" type="time" class="w-full border-2 rounded-2xl p-4 text-3xl font-mono text-center outline-none focus:border-red-500 shadow-inner" value="${s.arrivalTime || ''}">
                            <button onclick="markLate()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-red-700 transition-all active:scale-95">登校（赤四角）を確定</button>
                        </div>

                        ${s.type === 'earlyLeave' ? `<div class="p-3 bg-purple-50 rounded-xl text-center text-purple-700 font-bold text-sm">早退予定: ${s.leaveTime || '--:--'}</div>` : ''}
                        ${s.detail ? `<div class="p-3 bg-slate-100 rounded-xl text-center text-slate-600 font-bold text-sm">${s.detail}</div>` : ''}

                        <div class="flex gap-2 pt-2 border-t border-slate-100">
                            <button onclick="closeModal()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600">閉じる</button>
                            <button onclick="remove()" class="px-4 py-3 text-red-500 border border-red-100 rounded-xl font-bold hover:bg-red-50">削除</button>
                        </div>
                    </div>
                </div>
            `;
        }

        window.selectStudent = (id) => { state.selectedStudent = state.attendances.find(s => s.id === id); render(); };
        window.closeModal = () => { state.selectedStudent = null; render(); };
        
        window.add = async (type) => {
            if (!state.user) return;
            const codeInput = document.getElementById('in-code');
            const code = codeInput.value;
            const regDate = document.getElementById('reg-date').value;
            if (code.length !== 4) return alert("4ケタで入力してください");
            
            try {
                await addDoc(getCol(), {
                    studentId: code, grade: code[0], class: code[1], studentNum: code.substring(2),
                    type, status: 'absent',
                    date: regDate,
                    leaveTime: type === 'earlyLeave' ? document.getElementById('in-time').value : null,
                    arrivalTime: null,
                    detail: document.getElementById('in-detail').value,
                    period: document.getElementById('in-period').value,
                    timestamp: Date.now()
                });
                state.view = 'dashboard';
                state.selectedDate = regDate; // 登録した日付の表示に切り替え
                render();
            } catch (err) {
                console.error("Add Error:", err);
            }
        };

        window.markLate = async () => {
            if (!state.user || !state.selectedStudent) return;
            const time = document.getElementById('late-time').value;
            if (!time) return alert("登校時間を入力してください");
            try {
                await updateDoc(getDocRef(state.selectedStudent.id), { 
                    status: 'late', 
                    arrivalTime: time 
                });
                closeModal();
            } catch (err) {
                console.error("Update Error:", err);
            }
        };

        window.remove = async () => {
            if (!state.user || !confirm("このデータを削除しますか？")) return;
            try {
                await deleteDoc(getDocRef(state.selectedStudent.id));
                closeModal();
            } catch (err) {
                console.error("Delete Error:", err);
            }
        };

        init();
    </script>
</body>
</html>
