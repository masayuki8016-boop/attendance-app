<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>不在生徒見える化システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; }
        
        /* 生徒ユニットの基本スタイル */
        .student-unit { width: 38px; height: 50px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .num-base { font-size: 1.2rem; font-weight: 700; height: 38px; display: flex; align-items: center; justify-content: center; font-family: monospace; }
        
        /* 種別ごとのスタイル */
        .type-normal { color: #0f172a; }
        .type-official { color: #16a34a; font-weight: 900; } /* 公欠: 緑 */
        .type-vacation { color: #f97316; font-weight: 900; } /* ラーケ: オレンジ */
        
        /* 遅刻の赤い四角 */
        .late-square { border: 2.5px solid #ef4444; border-radius: 6px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background-color: #fef2f2; color: #ef4444; font-weight: 900; font-family: monospace; font-size: 1.1rem; }
        .late-time { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #ef4444; font-weight: 900; white-space: nowrap; }

        /* 早退の青緑の四角 */
        .leave-square { border: 2.5px solid #0d9488; border-radius: 6px; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; background-color: #f0fdfa; color: #0d9488; font-weight: 900; font-family: monospace; font-size: 1.1rem; }
        .leave-time { position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%); font-size: 8px; color: #0d9488; font-weight: 900; white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-100 pb-20">
    <div id="app">
        <div class="flex items-center justify-center h-screen text-slate-400 font-bold">起動中...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAGE1uP5-kwygyMxTli-9X9730a6vjFY_8",
            authDomain: "school-attendance-9a7b0.firebaseapp.com",
            projectId: "school-attendance-9a7b0",
            storageBucket: "school-attendance-9a7b0.firebasestorage.app",
            messagingSenderId: "158278661521",
            appId: "1:158278661521:web:2c0bcab31f59b35e101630"
        };

        const appId = "school-attendance-9a7b0";
        let db, auth;
        let state = { user: null, attendances: [], view: 'dashboard', selectedStudent: null, currentTime: "", inputType: 'normal' };

        async function init() {
            setInterval(() => {
                // ここで「秒（second）」を追加しました
                state.currentTime = new Date().toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const el = document.getElementById('digital-clock');
                if (el) el.innerText = state.currentTime;
            }, 1000);

            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) {
                        onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), (snapshot) => {
                            state.attendances = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            render();
                        });
                    } else {
                        signInAnonymously(auth);
                    }
                });
            } catch (e) { console.error(e); }
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.user) return;

            const dateStr = new Date().toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });

            root.innerHTML = `
                <header class="bg-white border-b sticky top-0 z-30 px-4 py-2 shadow-sm flex justify-between items-center h-14">
                    <div class="flex items-center gap-3">
                        <h1 class="text-[10px] font-black text-indigo-500 leading-tight hidden md:block">不在生徒見える化<br>システム</h1>
                        <div id="digital-clock" class="text-2xl md:text-3xl font-black text-indigo-600 font-mono tracking-tighter">${state.currentTime}</div>
                    </div>
                    <div class="text-sm font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-lg border border-slate-200">
                        ${dateStr}
                    </div>
                </header>
                <main class="p-2 max-w-[1600px] mx-auto">
                    ${state.view === 'dashboard' ? renderDashboard() : renderRegister()}
                </main>
                <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-2 flex justify-around shadow-lg z-40">
                    <button onclick="window.setView('dashboard')" class="flex flex-col items-center ${state.view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="layout-dashboard" size="20"></i><span class="text-[9px] font-bold">集中画面</span>
                    </button>
                    <button onclick="window.setView('register')" class="flex flex-col items-center ${state.view === 'register' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="user-plus" size="20"></i><span class="text-[9px] font-bold">連絡無し</span>
                    </button>
                </nav>
                ${state.selectedStudent ? renderModal() : ''}
            `;
            lucide.createIcons();
        }

        window.setView = (v) => { state.view = v; render(); };
        window.setInputType = (t) => { state.inputType = t; render(); };
        window.selectStudent = (id) => { state.selectedStudent = state.attendances.find(s => s.id === id); render(); };

        function renderDashboard() {
            // 早退（leave_early）もメインのボードに表示させる
            const boardData = state.attendances.filter(s => ['normal', 'official', 'vacation', 'leave_early'].includes(s.type || 'normal'));
            const sharedData = state.attendances.filter(s => ['infection', 'long', 'special'].includes(s.type));

            // 色の意味を示す凡例（Legend）を追加
            let html = `
            <div class="bg-white p-2 rounded-xl shadow-sm border border-slate-200 mb-3 flex flex-wrap gap-3 text-[10px] font-bold justify-center items-center">
                <span class="flex items-center gap-1 text-slate-800"><span class="w-2.5 h-2.5 bg-slate-800 rounded-full"></span> 不在</span>
                <span class="flex items-center gap-1 text-green-600"><span class="w-2.5 h-2.5 bg-green-600 rounded-full"></span> 公欠</span>
                <span class="flex items-center gap-1 text-orange-500"><span class="w-2.5 h-2.5 bg-orange-500 rounded-full"></span> ラーケ</span>
                <span class="flex items-center gap-1 text-teal-600"><span class="w-3 h-3 border-2 border-teal-500 rounded-sm"></span> 早退</span>
                <span class="flex items-center gap-1 text-red-600"><span class="w-3 h-3 border-2 border-red-500 rounded-sm"></span> 遅刻</span>
            </div>
            <div class="grid grid-cols-3 gap-2 md:gap-4">`;
            
            [1, 2, 3].forEach(g => {
                html += `<div class="space-y-2">
                    <h2 class="text-xs font-black text-slate-700 flex items-center gap-1 ml-1">
                        <span class="bg-slate-700 text-white w-4 h-4 flex items-center justify-center rounded text-[8px]">${g}</span>
                        学年
                    </h2>`;
                [1, 2, 3, 4, 5].forEach(c => {
                    const students = boardData.filter(s => s.grade == g && s.class == c);
                    html += `<div class="bg-white rounded-xl shadow-sm border border-slate-200 p-2 min-h-[80px]">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[9px] font-black text-slate-300">${c}組</span>
                        </div>
                        <div class="flex flex-wrap gap-1.5">
                            ${students.map(s => `
                                <div onclick="window.selectStudent('${s.id}')" class="student-unit cursor-pointer">
                                    <div class="${s.status === 'late' ? 'late-square' : (s.type === 'leave_early' ? 'leave-square' : `num-base type-${s.type || 'normal'}`)}">${s.studentNum}</div>
                                    ${s.status === 'late' ? `<div class="late-time">${s.arrivalTime}</div>` : (s.type === 'leave_early' ? `<div class="leave-time">${s.leaveTime || ''}</div>` : '')}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });
            html += '</div>';

            if (sharedData.length > 0) {
                html += `
                <div class="mt-6 border-t pt-4">
                    <h3 class="text-[10px] font-black text-indigo-400 mb-2 flex items-center gap-1 uppercase tracking-widest"><i data-lucide="info" size="12"></i> 学年共有情報</h3>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                        ${sharedData.map(s => `
                            <div onclick="window.selectStudent('${s.id}')" class="bg-white border-l-4 border-indigo-500 rounded p-2 shadow-sm cursor-pointer flex justify-between items-center">
                                <div>
                                    <div class="text-[10px] font-black">${s.studentId}</div>
                                    <div class="text-[8px] text-slate-400">${s.detail || (s.type === 'infection' ? '感染症' : '共有事項')}</div>
                                    ${s.period ? `<div class="text-[8px] text-indigo-400 font-bold">${s.period}</div>` : ''}
                                </div>
                                <i data-lucide="chevron-right" size="12" class="text-slate-300"></i>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            return html;
        }

        function renderRegister() {
            const types = [
                { id: 'normal', label: '不在', color: 'bg-slate-800' },
                { id: 'official', label: '公欠', color: 'bg-green-600' },
                { id: 'vacation', label: 'ラーケ', color: 'bg-orange-500' },
                { id: 'leave_early', label: '早退', color: 'bg-teal-600' },
                { id: 'infection', label: '感染症', color: 'bg-blue-600' },
                { id: 'long', label: '長欠', color: 'bg-indigo-400' },
                { id: 'special', label: '別室', color: 'bg-purple-600' }
            ];

            return `<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-6 mt-2 space-y-4">
                <h2 class="text-xl font-black text-indigo-600 text-center uppercase tracking-tighter">連絡無し生徒</h2>
                
                <div class="grid grid-cols-4 gap-2">
                    ${types.map(t => `
                        <button onclick="window.setInputType('${t.id}')" class="py-2 rounded-xl text-[10px] font-black transition-all border-2 ${state.inputType === t.id ? `${t.color} text-white border-transparent` : 'bg-white border-slate-100 text-slate-400'}">
                            ${t.label}
                        </button>
                    `).join('')}
                </div>

                <div class="pt-2">
                    <div class="flex justify-between px-2 mb-1 text-[8px] font-bold text-slate-400 uppercase tracking-widest"><span>学年</span><span>組</span><span>番号</span></div>
                    <input id="in-code" type="number" inputmode="numeric" class="w-full bg-slate-50 border-2 rounded-2xl p-4 text-4xl font-mono text-center outline-none focus:border-indigo-500" placeholder="0000">
                </div>

                ${['infection', 'long', 'special'].includes(state.inputType) ? `
                    <div class="space-y-2">
                        <input id="in-detail" type="text" class="w-full border-2 rounded-xl p-3 text-xs outline-none" placeholder="詳細・理由を入力">
                        <input id="in-period" type="text" class="w-full border-2 rounded-xl p-3 text-xs outline-none" placeholder="期間を入力（例: 4/25まで）">
                    </div>
                ` : ''}
                ${state.inputType === 'leave_early' ? `
                    <div class="bg-teal-50 p-3 rounded-xl border border-teal-100">
                        <label class="block text-center text-[8px] font-black text-teal-600 uppercase mb-1">早退した時間を入力</label>
                        <input id="in-leave-time" type="time" class="w-full border-2 border-teal-100 rounded-lg p-2 text-xl text-center outline-none focus:border-teal-500">
                    </div>
                ` : ''}
                <button onclick="window.add()" class="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform">登録を確定する</button>
            </div>`;
        }

        window.add = async () => {
            const code = document.getElementById('in-code').value;
            const detail = document.getElementById('in-detail')?.value || "";
            const period = document.getElementById('in-period')?.value || "";
            const leaveTime = document.getElementById('in-leave-time')?.value || "";

            if (code.length !== 4) return alert("4ケタで入力してください");
            if (state.inputType === 'leave_early' && !leaveTime) return alert("早退時間を入力してください");

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), { 
                studentId: code, 
                grade: parseInt(code[0]), 
                class: parseInt(code[1]), 
                studentNum: code.substring(2), 
                type: state.inputType,
                status: state.inputType === 'leave_early' ? 'leave_early' : 'absent', 
                detail: detail,
                period: period,
                leaveTime: leaveTime,
                timestamp: Date.now() 
            });
            state.view = 'dashboard'; state.inputType = 'normal'; render();
        };

        window.markLate = async () => {
            const time = document.getElementById('late-time').value;
            if (!time) return alert("時間入力");
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedStudent.id), { status: 'late', arrivalTime: time });
            state.selectedStudent = null; render();
        };

        window.remove = async () => {
            if (confirm("削除しますか?")) {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedStudent.id));
                state.selectedStudent = null; render();
            }
        };

        function renderModal() {
            const s = state.selectedStudent;
            return `<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-white rounded-3xl w-full max-w-xs p-6 space-y-4 shadow-2xl">
                    <div class="text-center font-black text-4xl font-mono">${s.studentId}</div>
                    <div class="text-center text-[10px] font-bold text-slate-400">
                        ${s.type === 'leave_early' ? `<span class="text-teal-600">早退時間: ${s.leaveTime}</span>` : s.detail || '理由未登録'} 
                        ${s.period ? `<br><span class="text-indigo-400">期間: ${s.period}</span>` : ''}
                    </div>
                    ${s.type !== 'leave_early' ? `
                    <div class="bg-red-50 p-3 rounded-xl space-y-2 border border-red-100">
                        <label class="block text-center text-[8px] font-black text-red-400 uppercase">遅刻時間を入力</label>
                        <input id="late-time" type="time" class="w-full border-2 rounded-lg p-2 text-2xl text-center outline-none" value="${s.arrivalTime || ''}">
                        <button onclick="window.markLate()" class="w-full bg-red-600 text-white font-black py-3 rounded-lg text-xs">遅刻として確定</button>
                    </div>
                    ` : ''}
                    <div class="flex gap-2">
                        <button onclick="state.selectedStudent=null;render()" class="flex-1 py-2 bg-slate-100 rounded-lg text-xs font-bold text-slate-400">閉じる</button>
                        <button onclick="window.remove()" class="px-3 py-2 text-red-300 text-[10px] font-bold">削除</button>
                    </div>
                </div>
            </div>`;
        }
        init();
    </script>
</body>
</html>
