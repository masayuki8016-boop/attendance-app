<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校出欠管理システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; }
        /* 各生徒の表示ユニット */
        .student-unit { width: 45px; height: 65px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .absent-num { font-size: 1.5rem; font-weight: 700; color: #0f172a; height: 45px; display: flex; align-items: center; justify-content: center; font-family: monospace; }
        .late-square { border: 3px solid #ef4444; border-radius: 8px; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background-color: #fef2f2; color: #ef4444; font-weight: 900; font-family: monospace; font-size: 1.25rem; }
        .late-time { position: absolute; bottom: 0px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #ef4444; font-weight: 900; white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-100 pb-24">
    <div id="app">
        <!-- 読み込み中表示 -->
        <div class="flex items-center justify-center h-screen">
            <div class="text-center">
                <div id="status-spinner" class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
                <p id="status-text" class="text-slate-500 font-bold">システムを起動中...</p>
                <div id="error-display" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-xl text-sm max-w-xs mx-auto"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        // ==========================================================
        // Firebase設定（提供された値を反映済み）
        // ==========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyAGE1uP5-kwygyMxTli-9X9730a6vjFY_8",
            authDomain: "school-attendance-9a7b0.firebaseapp.com",
            projectId: "school-attendance-9a7b0",
            storageBucket: "school-attendance-9a7b0.firebasestorage.app",
            messagingSenderId: "158278661521",
            appId: "1:158278661521:web:2c0bcab31f59b35e101630"
        };
        // ==========================================================

        const appId = "school-attendance-9a7b0";
        let db, auth;
        let state = { user: null, attendances: [], view: 'dashboard', selectedStudent: null, currentTime: "" };

        function showError(msg) {
            const errEl = document.getElementById('error-display');
            const spin = document.getElementById('status-spinner');
            if(errEl) {
                errEl.innerText = msg;
                errEl.classList.remove('hidden');
                if(spin) spin.classList.add('hidden');
                document.getElementById('status-text').innerText = "エラーが発生しました";
            }
        }

        async function init() {
            setInterval(() => {
                state.currentTime = new Date().toLocaleTimeString('ja-JP', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const el = document.getElementById('digital-clock');
                if (el) el.innerText = state.currentTime;
            }, 1000);

            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);

                onAuthStateChanged(auth, (user) => {
                    state.user = user;
                    if (user) {
                        const getCol = () => collection(db, 'artifacts', appId, 'public', 'data', 'attendance');
                        onSnapshot(getCol(), (snapshot) => {
                            state.attendances = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                            render();
                        }, (err) => {
                            showError("Firestoreの権限エラーです。");
                        });
                    } else {
                        signInAnonymously(auth).catch(e => showError("ログインエラー"));
                    }
                });
            } catch (e) {
                showError("初期化エラー: " + e.message);
            }
        }

        function render() {
            const root = document.getElementById('app');
            if (!state.user) return;

            // 日付のフォーマットを大きく、曜日付きに設定
            const today = new Date();
            const dateStr = today.toLocaleDateString('ja-JP', { 
                month: 'long', 
                day: 'numeric', 
                weekday: 'short' 
            });

            root.innerHTML = `
                <header class="bg-white border-b sticky top-0 z-30 px-4 py-4 shadow-sm flex justify-between items-center">
                    <h1 class="text-xs font-bold text-indigo-500">出欠管理システム</h1>
                    <div id="digital-clock" class="text-4xl font-black text-indigo-600 font-mono tracking-tighter">${state.currentTime}</div>
                    <div class="text-right text-sm font-black text-slate-500 bg-slate-100 px-3 py-1 rounded-full border border-slate-200">
                        ${dateStr}
                    </div>
                </header>
                <main class="p-4 max-w-7xl mx-auto">
                    ${state.view === 'dashboard' ? renderDashboard() : renderRegister()}
                </main>
                <nav class="fixed bottom-0 left-0 right-0 bg-white border-t p-3 flex justify-around shadow-lg z-40 pb-safe">
                    <button onclick="window.setView('dashboard')" class="flex flex-col items-center ${state.view === 'dashboard' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="layout-dashboard"></i><span class="text-[10px] font-bold">表示</span>
                    </button>
                    <button onclick="window.setView('register')" class="flex flex-col items-center ${state.view === 'register' ? 'text-indigo-600' : 'text-slate-400'}">
                        <i data-lucide="user-plus"></i><span class="text-[10px] font-bold">登録</span>
                    </button>
                </nav>
                ${state.selectedStudent ? renderModal() : ''}
            `;
            lucide.createIcons();
        }

        window.setView = (v) => { state.view = v; render(); };
        window.selectStudent = (id) => { state.selectedStudent = state.attendances.find(s => s.id === id); render(); };

        function renderDashboard() {
            let html = '<div class="grid grid-cols-1 md:grid-cols-3 gap-6">';
            [1, 2, 3].forEach(g => {
                html += `<div><h2 class="text-xl font-black mb-2 text-slate-700 flex items-center gap-2">
                    <span class="bg-slate-700 text-white w-7 h-7 flex items-center justify-center rounded text-sm">${g}</span>
                    学年
                </h2>`;
                [1, 2, 3, 4, 5].forEach(c => {
                    const students = state.attendances.filter(s => s.grade == g && s.class == c);
                    // クラスボックスの縦幅を min-h-[200px] で大きく確保
                    html += `<div class="bg-white rounded-2xl shadow-sm border border-slate-200 mb-4 p-4 min-h-[200px]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-black text-slate-400">${c}組</span>
                            <span class="text-[10px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full font-mono font-bold">${students.length}名</span>
                        </div>
                        <div class="flex flex-wrap gap-3 content-start">
                            ${students.length === 0 ? '<div class="w-full text-center py-10 text-[10px] text-slate-200 font-bold italic uppercase">No Data</div>' : students.map(s => `
                                <div onclick="window.selectStudent('${s.id}')" class="student-unit cursor-pointer transition-transform active:scale-90">
                                    <div class="${s.status === 'late' ? 'late-square' : 'absent-num'}">${s.studentNum}</div>
                                    ${s.status === 'late' ? `<div class="late-time">${s.arrivalTime}</div>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
                });
                html += `</div>`;
            });
            return html + '</div>';
        }

        function renderRegister() {
            return `<div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 space-y-6 animate-in slide-in-from-bottom-4 duration-300">
                <h2 class="text-2xl font-black text-indigo-600">新規欠席登録</h2>
                <div class="text-xs font-bold text-slate-400 uppercase tracking-widest">学年・組・番号（例: 1205）</div>
                <input id="in-code" type="number" inputmode="numeric" class="w-full bg-slate-50 border-2 rounded-2xl p-6 text-5xl font-mono text-center outline-none focus:border-indigo-500 focus:bg-white transition-all shadow-inner" placeholder="0000">
                <button onclick="window.add()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-transform text-lg">登録を確定する</button>
                <div class="text-center text-[10px] text-slate-400 font-bold">登録後、表示画面で遅刻への変更が可能です</div>
            </div>`;
        }

        window.add = async () => {
            const code = document.getElementById('in-code').value;
            if (code.length !== 4) return alert("4ケタで入力してください");
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), { 
                    studentId: code, 
                    grade: parseInt(code[0]), 
                    class: parseInt(code[1]), 
                    studentNum: code.substring(2), 
                    type: 'absent', 
                    status: 'absent', 
                    timestamp: Date.now() 
                });
                state.view = 'dashboard'; render();
            } catch (e) {
                alert("登録エラー");
            }
        };

        window.markLate = async () => {
            const time = document.getElementById('late-time').value;
            if (!time) return alert("時間を入力してください");
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedStudent.id), { 
                    status: 'late', 
                    arrivalTime: time 
                });
                state.selectedStudent = null; render();
            } catch (e) {
                alert("更新エラー");
            }
        };

        window.remove = async () => {
            if (!confirm("このデータを削除しますか？")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', state.selectedStudent.id));
                state.selectedStudent = null; render();
            } catch (e) {
                alert("削除エラー");
            }
        };

        function renderModal() {
            const s = state.selectedStudent;
            return `<div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 animate-in fade-in duration-200">
                <div class="bg-white rounded-3xl w-full max-w-sm p-6 space-y-4 shadow-2xl animate-in zoom-in-95 duration-200">
                    <div class="text-center">
                        <div class="text-xs font-black text-slate-300 uppercase tracking-widest mb-1">対象生徒</div>
                        <div class="text-5xl font-black text-slate-800 font-mono">${s.studentId}</div>
                        <div class="text-xs font-bold text-slate-400 mt-2 bg-slate-100 inline-block px-3 py-1 rounded-full">${s.grade}年${s.class}組 ${s.studentNum}番</div>
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl space-y-2 border border-red-100">
                        <label class="block text-center text-[10px] font-black text-red-400 uppercase tracking-tighter">遅刻登校時間を入力</label>
                        <input id="late-time" type="time" class="w-full border-2 border-red-100 rounded-xl p-4 text-3xl text-center outline-none focus:border-red-500 font-mono shadow-inner" value="${s.arrivalTime || ''}">
                        <button onclick="window.markLate()" class="w-full bg-red-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-transform">遅刻確定（赤枠表示）</button>
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button onclick="state.selectedStudent=null;render()" class="flex-1 py-3 bg-slate-100 rounded-xl font-bold text-slate-600 active:bg-slate-200">閉じる</button>
                        <button onclick="window.remove()" class="px-4 py-3 text-red-300 font-bold hover:text-red-500 transition-colors">削除</button>
                    </div>
                </div>
            </div>`;
        }
        init();
    </script>
</body>
</html>
